# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: api

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./api/src/Clovance.ApiService
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      working-directory: ./api/src/Clovance.ApiService

    - name: Restore unit tests dependencies
      run: dotnet restore
      working-directory: ./api/tests/Clovance.UnitTests

    - name: Build unit tests
      run: dotnet build --no-restore --configuration Release
      working-directory: ./api/tests/Clovance.UnitTests      
    
    - name: Run unit tests
      run: dotnet test --no-build --verbosity normal --configuration Release
      working-directory: ./api/tests/Clovance.UnitTests

    - name: Restore integration tests dependencies
      run: dotnet restore
      working-directory: ./api/tests/Clovance.IntegrationTests

    - name: Build integration tests
      run: dotnet build --no-restore --configuration Release
      working-directory: ./api/tests/Clovance.IntegrationTests
    
    - name: Run integration tests
      run: dotnet test --no-build --verbosity normal --configuration Release
      working-directory: ./api/tests/Clovance.IntegrationTests
