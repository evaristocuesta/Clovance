# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: api

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: clovance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Pull Docker images
      run: |
        docker pull postgres:17
        docker pull mcr.microsoft.com/dotnet/aspnet:10.0        
        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./api/src/Clovance.ApiService
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      working-directory: ./api/src/Clovance.ApiService

    - name: Restore unit tests dependencies
      run: dotnet restore
      working-directory: ./api/tests/Clovance.UnitTests

    - name: Build unit tests
      run: dotnet build --no-restore --configuration Release
      working-directory: ./api/tests/Clovance.UnitTests      
    
    - name: Run unit tests
      run: dotnet test --no-build --verbosity normal --configuration Release --filter "FullyQualifiedName~UnitTests"
      working-directory: ./api/tests/Clovance.UnitTests

    - name: Restore integration tests dependencies
      run: dotnet restore
      working-directory: ./api/tests/Clovance.IntegrationTests

    - name: Build integration tests
      run: dotnet build --no-restore --configuration Release
      working-directory: ./api/tests/Clovance.IntegrationTests
    
    - name: Run integration tests
      run: dotnet test --no-build --verbosity normal --configuration Release --filter "FullyQualifiedName~IntegrationTests" --blame-hang-timeout 10m
      working-directory: ./api/tests/Clovance.IntegrationTests
      env:
        ConnectionStrings__Database: "Host=localhost;Port=5432;Database=clovance_test;Username=postgres;Password=postgres"
