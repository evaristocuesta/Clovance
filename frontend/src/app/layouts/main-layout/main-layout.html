<div class="antialiased min-h-screen bg-gray-50 dark:bg-gray-900" *transloco="let t">
  <nav class="bg-white border-b border-gray-200 px-4 py-2.5 dark:bg-gray-800 dark:border-gray-700 fixed left-0 right-0 top-0 z-50">
    <div class="flex flex-wrap justify-between items-center">
      <div class="flex justify-start items-center">
        <button data-drawer-target="drawer-navigation"
                data-drawer-toggle="drawer-navigation"
                aria-controls="drawer-navigation"
                class="p-2 mr-2 text-gray-600 rounded-lg cursor-pointer md:hidden hover:text-gray-900 hover:bg-gray-100 focus:bg-gray-100 dark:focus:bg-gray-700 focus:ring-2 focus:ring-gray-100 dark:focus:ring-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">
          <svg aria-hidden="true"
               class="w-6 h-6"
               fill="currentColor"
               viewBox="0 0 20 20"
               xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd"
                  d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
                  clip-rule="evenodd"></path>
          </svg>
          <svg aria-hidden="true"
               class="hidden w-6 h-6"
               fill="currentColor"
               viewBox="0 0 20 20"
               xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd"
                  d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                  clip-rule="evenodd"></path>
          </svg>
          <span class="sr-only">{{ t('mainLayout.topbar.toggleSidebar') }}</span>
        </button>
        <div class="flex items-center justify-between mr-4">
          <app-logo class="mr-3 h-10 w-auto block xs:hidden md:block text-black dark:text-white" />
          <app-logo-full class="mb-1 h-8 sm:h-9 w-auto hidden xs:block text-black dark:text-white" />
        </div>
      </div>
      <div class="flex items-center lg:order-2">
        <!-- Language selector -->
        <app-language-selection></app-language-selection>
        <!-- Theme toggle -->
        <app-theme-toggle></app-theme-toggle>

        <button type="button"
                class="p-0 sm:p-2 text-sm text-gray-500 rounded-lg cursor-pointer hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-700"
                id="user-menu-button"
                aria-expanded="false"
                data-dropdown-toggle="dropdown">
          <span class="sr-only">{{ t('mainLayout.topbar.openUserMenu') }}</span>
          <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm0 0a8.949 8.949 0 0 0 4.951-1.488A3.987 3.987 0 0 0 13 16h-2a3.987 3.987 0 0 0-3.951 3.512A8.948 8.948 0 0 0 12 21Zm3-11a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>

        </button>
        <!-- Dropdown menu -->
        <div class="hidden z-50 my-4 w-56 text-base list-none bg-white rounded divide-y divide-gray-100 shadow dark:bg-gray-700 dark:divide-gray-600 rounded-xl"
             id="dropdown">
          <div class="py-3 px-4">
            <span class="block text-sm font-semibold text-gray-900 dark:text-white">{{ authService.getCurrentUser()?.firstName }} {{ authService.getCurrentUser()?.lastName }}</span>
            <span class="block text-sm text-gray-900 truncate dark:text-white">{{ authService.getCurrentUser()?.email }}</span>
          </div>
          <ul class="py-1 text-gray-700 dark:text-gray-300"
              aria-labelledby="dropdown">
            <li>
              <a routerLink="/account-settings"
                  class="flex items-center p-2 block w-full text-left py-2 px-4 text-sm cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                  <app-icon
                      name="user-settings"
                      class="w-6 h-6 text-gray-800 dark:text-white">
                  </app-icon>
                  <span class="flex-1 ml-3 text-left whitespace-nowrap">{{ t('mainLayout.userMenu.accountSettings') }}</span>
              </a>
            </li>
            @if (authService.isAdmin()) {
            <li>
              <a routerLink="/users"
                  class="flex items-center p-2 block w-full text-left py-2 px-4 text-sm cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                  <app-icon
                      name="users"
                      class="w-6 h-6 text-gray-800 dark:text-white">
                  </app-icon>
                  <span class="flex-1 ml-3 text-left whitespace-nowrap">{{ t('mainLayout.userMenu.users') }}</span>
              </a>
            </li>            
          }
          </ul>
          <ul class="py-1 text-gray-700 dark:text-gray-300"
              aria-labelledby="dropdown">
            <li>
              <button type="button"
                      (click)="logout()"
                      class="flex items-center p-2 block w-full text-left py-2 px-4 text-sm cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-600 dark:hover:text-white">
                <app-icon
                    name="arrow-right-to-bracket"
                    class="w-6 h-6 text-gray-800 dark:text-white">
                </app-icon>
                <span class="flex-1 ml-3 text-left whitespace-nowrap">{{ t('mainLayout.userMenu.logout') }}</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <!-- Sidebar -->

  <aside class="fixed top-0 left-0 z-40 w-64 h-screen pt-14 transition-transform -translate-x-full bg-white border-r border-gray-200 md:translate-x-0 dark:bg-gray-800 dark:border-gray-700"
         aria-label="Sidenav"
         id="drawer-navigation">
    <div class="overflow-y-auto py-5 px-3 h-full bg-white dark:bg-gray-800">
      <ul class="space-y-2">
        <li>
          <button type="button"
                  class="flex items-center p-2 w-full cursor-pointer text-base font-medium text-gray-900 rounded-lg transition duration-75 group hover:bg-gray-100 dark:text-white dark:hover:bg-gray-700">
            <app-icon
                name="sort-horizontal"
                class="w-6 h-6 text-gray-800 dark:text-white">
            </app-icon>
            <span class="flex-1 ml-3 text-left whitespace-nowrap">{{ t('mainLayout.sidebar.transactions') }}</span>
          </button>
        </li>
        <li>
          <button type="button"
                  class="flex items-center p-2 w-full cursor-pointer text-base font-medium text-gray-900 rounded-lg transition duration-75 group hover:bg-gray-100 dark:text-white dark:hover:bg-gray-700">
            <app-icon
                name="chart-line-up"
                class="w-6 h-6 text-gray-800 dark:text-white">
            </app-icon>
            <span class="flex-1 ml-3 text-left whitespace-nowrap">{{ t('mainLayout.sidebar.summary') }}</span>
          </button>
        </li>
        <li>
          <button type="button"
                  class="flex items-center p-2 w-full cursor-pointer text-base font-medium text-gray-900 rounded-lg transition duration-75 group hover:bg-gray-100 dark:text-white dark:hover:bg-gray-700">
            <app-icon
                name="wallet"
                class="w-6 h-6 text-gray-800 dark:text-white">
            </app-icon>
            <span class="flex-1 ml-3 text-left whitespace-nowrap">{{ t('mainLayout.sidebar.accounts') }}</span>
          </button>
        </li>
      </ul>
    </div>
  </aside>

  <main class="p-4 md:ml-64 h-auto pt-20">
    <!-- Content from child routes renders here -->
    <router-outlet></router-outlet>
  </main>
</div>
