<div
  aria-modal="true"
  [attr.aria-labelledby]="'confirm-dialog-title'"
  class="w-full max-w-md rounded-lg bg-white shadow-lg dark:bg-gray-800">

  <div class="flex justify-between items-center p-4 mb-4 rounded-t border-b sm:mb-5 dark:border-gray-600">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
        {{ data?.title }}
    </h3>
    <button 
        type="button" 
        (click)="cancel()"
        class="text-gray-400 cursor-pointer bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-toggle="inviteUserModal">
        <app-icon
            name="close"
            class="w-5 h-5">
        </app-icon>
        <span class="sr-only">Close modal</span>
    </button>
  </div>

  <div class="p-4">

    <p class="text-gray-600 dark:text-gray-400">
      {{ data?.message }}
    </p>

  </div>

  <div class="flex justify-end gap-2 border-t p-4 dark:border-gray-600">

    <button
      type="button"
      (click)="cancel()"
      class="inline-flex items-center justify-center gap-2 cursor-pointer rounded-lg border border-gray-300 px-4 py-2 text-sm font-medium text-gray-800 dark:text-white hover:bg-gray-100 dark:border-gray-600 dark:hover:bg-gray-700">
      <app-icon
        name="close"
        class="w-6 h-6">
      </app-icon>
      {{ data?.cancelText }}
    </button>

    <button
      type="button"
      (click)="accept()"
      [class.bg-red-600]="data?.danger"
      [class.hover:bg-red-700]="data?.danger"
      [class.bg-primary-600]="!data?.danger"
      [class.hover:bg-primary-700]="!data?.danger"
      class="inline-flex items-center justify-center gap-2 cursor-pointer rounded-lg px-4 py-2 text-sm font-medium text-white focus:ring-4 focus:ring-primary-300 focus:outline-none dark:focus:ring-primary-800">
      @if (confirmIcon) {
        <app-icon
          [name]="confirmIcon"
          class="w-6 h-6">
        </app-icon>
      }
      {{ data?.confirmText }}
    </button>

  </div>

</div>
