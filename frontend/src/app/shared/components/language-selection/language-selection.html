<div class="relative" *transloco="let t">
  <button type="button"
          data-dropdown-toggle="language-dropdown"
          data-tooltip-target="tooltip-language-selection"
          class="inline-flex justify-center items-center p-2 text-sm text-gray-500 rounded-lg cursor-pointer hover:text-gray-900 hover:bg-gray-100 dark:hover:bg-gray-700 dark:hover:text-white">
    <!-- Spanish Flag -->
    @if (getCurrentLanguage() === 'es') {
      <svg aria-hidden="true"
           class="h-5 w-5 rounded-full"
           xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 512 512">
        <path fill="#c60b1e" d="M0 341.3h512V512H0z" />
        <path fill="#c60b1e" d="M0 0h512v170.7H0z" />
        <path fill="#ffc400" d="M0 170.7h512v170.6H0z" />
      </svg>
    }
    <!-- US Flag -->
    @if (getCurrentLanguage() === 'en') {
      <svg aria-hidden="true"
           class="h-5 w-5 rounded-full"
           xmlns="http://www.w3.org/2000/svg"
           xmlns:xlink="http://www.w3.org/1999/xlink"
           viewBox="0 0 3900 3900">
        <path fill="#b22234" d="M0 0h7410v3900H0z" />
        <path d="M0 450h7410m0 600H0m0 600h7410m0 600H0m0 600h7410m0 600H0"
              stroke="#fff"
              stroke-width="300" />
        <path fill="#3c3b6e" d="M0 0h2964v2100H0z" />
        <g fill="#fff">
          <g id="d">
            <g id="c">
              <g id="e">
                <g id="b">
                  <path id="a"
                        d="M247 90l70.534 217.082-184.66-134.164h228.253L176.466 307.082z" />
                  <use xlink:href="#a" y="420" />
                  <use xlink:href="#a" y="840" />
                  <use xlink:href="#a" y="1260" />
                </g>
                <use xlink:href="#a" y="1680" />
              </g>
              <use xlink:href="#b" x="247" y="210" />
            </g>
            <use xlink:href="#c" x="494" />
          </g>
          <use xlink:href="#d" x="988" />
          <use xlink:href="#c" x="1976" />
          <use xlink:href="#e" x="2470" />
        </g>
      </svg>
    }
  </button>
  <!-- Dropdown -->

       id="language-dropdown">
    <ul class="py-1" role="none">
      <li>
        <a href="#"
           (click)="changeLanguage('es')"
           class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:text-white dark:hover:bg-gray-600"
           role="menuitem">
          <div class="inline-flex items-center">
            <svg aria-hidden="true"
                 class="h-3.5 w-3.5 rounded-full mr-2"
                 xmlns="http://www.w3.org/2000/svg"

              <path fill="#c60b1e" d="M0 0h512v170.7H0z" />
              <path fill="#ffc400" d="M0 170.7h512v170.6H0z" />
            </svg>

       role="tooltip" 
       class="inline-block absolute invisible z-10 py-2 px-3 text-sm font-medium text-white whitespace-nowrap transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
