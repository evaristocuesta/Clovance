<div *transloco="let t">
  <button type="button" 
          data-tooltip-target="tooltip-theme-toggle"
          (click)="toggleTheme()" 
          class="p-2 text-sm text-gray-500 rounded-lg cursor-pointer hover:text-gray-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-gray-700">
    @if (isDark()) {
      <!-- Sun icon - visible in dark mode -->
      <app-icon name="sun" class="w-6 h-6"></app-icon>
    } @else {
      <!-- Moon icon - visible in light mode -->
      <app-icon name="moon" class="w-6 h-6"></app-icon>
    }
  </button>
  <div id="tooltip-theme-toggle" 
       role="tooltip" 
       class="inline-block absolute invisible z-10 py-2 px-3 text-sm font-medium text-white whitespace-nowrap transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
    @if (isDark()) {
      {{ t('theme.lightTheme') }}
    } @else {
      {{ t('theme.darkTheme') }}
    }
    <div class="tooltip-arrow" data-popper-arrow></div>
  </div>
</div>
