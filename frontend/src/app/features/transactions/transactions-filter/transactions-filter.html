<form class="w-full" [formRoot]="filterForm" *transloco="let t" novalidate>
	<div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-4">
		<div>
			<label for="transaction-date-from" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-600 dark:text-gray-300">
				{{ t('transactions.filters.dateFrom') }}
			</label>
			<input
				id="transaction-date-from"
				type="date"
				[formField]="filterForm.dateFrom"
				class="block w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
			>
		</div>
		<div>
			<label for="transaction-date-to" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-600 dark:text-gray-300">
				{{ t('transactions.filters.dateTo') }}
			</label>
			<input
				id="transaction-date-to"
				type="date"
				[formField]="filterForm.dateTo"
				class="block w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
			>
		</div>

		<div>
			<label for="transaction-account" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-600 dark:text-gray-300">
				{{ t('transactions.filters.account') }}
			</label>
			<select
				id="transaction-account"
				[formField]="filterForm.accountId"
				class="block w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
			>
				<option value="">{{ t('transactions.filters.allAccounts') }}</option>
				@for (account of accounts(); track account.id) {
					<option [value]="account.id">{{ account.name }}</option>
				}
			</select>
		</div>

		<div>
			<label for="transaction-description" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-600 dark:text-gray-300">
				{{ t('transactions.filters.description') }}
			</label>
			<input
				id="transaction-description"
				type="text"
				[formField]="filterForm.description"
				[placeholder]="t('transactions.filters.descriptionPlaceholder')"
				class="block w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
			>
		</div>
	</div>

	<div class="mt-3 flex flex-wrap items-center justify-end gap-2">
		<button
			type="button"
			(click)="onReset()"
			class="inline-flex items-center justify-center rounded-lg cursor-pointer border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:border-gray-600 dark:text-gray-200 dark:hover:bg-gray-700 dark:focus:ring-gray-700"
		>
            <app-icon
                name="trash-bin"
                class="mr-2 w-4 h-4">
            </app-icon>
			{{ t('transactions.filters.clear') }}
		</button>
		<button
			type="submit"
			class="inline-flex items-center justify-center rounded-lg cursor-pointer bg-primary-700 px-4 py-2 text-sm font-medium text-white hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800"
		>
            <app-icon
                name="filter"
                class="mr-2 w-4 h-4">
            </app-icon>
			{{ t('transactions.filters.apply') }}
		</button>
	</div>
	@if (getDateRangeErrorMessage(); as dateRangeErrorMessage) {
		<p class="mt-2 text-sm text-red-600 dark:text-red-500">{{ t(dateRangeErrorMessage) }}</p>
	}
</form>
