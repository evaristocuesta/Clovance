<article class="group relative z-0 w-full overflow-visible rounded-2xl border border-gray-200 bg-white p-5 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg dark:border-gray-700 dark:bg-gray-800" [class.z-30]="isActionsMenuOpen()" *transloco="let t">
	<div class="absolute inset-y-0 left-0 w-1 bg-primary-600"></div>

	<div class="flex min-w-0 flex-col gap-5 pl-2 sm:flex-row sm:items-center sm:justify-between sm:gap-4 lg:gap-6">
		<div class="min-w-0 flex-1">
			<div class="min-w-0">
				<p class="text-xs font-semibold uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">
					{{ transaction().accountName }}
				</p>
				<h3 class="mt-1 break-all text-lg font-semibold text-gray-900 dark:text-white">
					{{ transaction().description }}
				</h3>
				<p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
					{{ formattedDate() }}
				</p>
				<div class="mt-2 flex flex-wrap items-center gap-2">
					<span
						class="inline-flex items-center rounded-full px-3 py-1 text-xs font-medium"
						[class.bg-primary-100]="isPositive()"
						[class.text-primary-700]="isPositive()"
						[class.bg-red-100]="!isPositive()"
						[class.text-red-700]="!isPositive()">
						{{ t(`transactions.${typeLabel()}`) }}
					</span>
				</div>
			</div>
		</div>

		<div class="flex w-full items-center justify-between gap-3 sm:w-auto sm:shrink-0 sm:justify-end">
			<div
				[class]="amountClass()">
				{{ signedAmount() }}
			</div>

			<div class="relative">
				<button
					type="button"
					(click)="toggleActionsMenu()"
					[attr.aria-expanded]="isActionsMenuOpen()"
					aria-label="Open transaction actions"
					class="inline-flex h-9 w-9 items-center justify-center cursor-pointer rounded-xl border border-gray-200 bg-white text-gray-500 shadow-sm transition-colors hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-white dark:focus:ring-primary-800">
					<app-icon
						name="ellipsis-vertical"
						class="h-5 w-5">
					</app-icon>
				</button>

				@if (isActionsMenuOpen()) {
					<div class="absolute right-0 top-full z-20 mt-2 flex w-44 flex-col gap-2 rounded-2xl border border-gray-200 bg-white p-2 shadow-xl dark:border-gray-600 dark:bg-gray-800">
						<button
							type="button"
							(click)="onEdit()"
							class="inline-flex h-11 w-full items-center justify-center gap-2 cursor-pointer rounded-xl bg-primary-700 px-4 text-sm font-medium text-white transition-colors hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">
							<app-icon
								name="edit"
								class="h-5 w-5">
							</app-icon>
							{{ t('transactions.edit') }}
						</button>

						<button
							type="button"
							(click)="onDelete()"
							class="inline-flex h-11 w-full items-center justify-center gap-2 cursor-pointer rounded-xl bg-red-600 px-4 text-sm font-medium leading-none text-white transition-colors hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-300 dark:bg-red-500 dark:hover:bg-red-600 dark:focus:ring-red-900">
							<app-icon
								name="trash-bin"
								class="h-5 w-5">
							</app-icon>
							{{ t('transactions.delete') }}
						</button>
					</div>
				}
			</div>
		</div>
	</div>
</article>
