<section class="bg-gray-50 dark:bg-gray-900" *transloco="let t">
  <div class="flex flex-col items-center justify-center">
    <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
      <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
        <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white">
          {{ t('accounts.title') }}
        </h1>
        <form [formRoot]="accountForm" class="space-y-4 md:space-y-6" novalidate>
          <div>
            <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ t('accounts.nameLabel') }}</label>
            <input type="text" id="name" [formField]="accountForm.name" autocomplete="given-name" placeholder="{{ t('accounts.namePlaceholder') }}" class="bg-gray-50 border text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500" [class.border-red-500]="accountForm.name().invalid() && accountForm.name().touched()" [class.border-gray-300]="!accountForm.name().invalid() || !accountForm.name().touched()" [class.dark:border-red-500]="accountForm.name().invalid() && accountForm.name().touched()" [class.dark:border-gray-600]="!accountForm.name().invalid() || !accountForm.name().touched()">
            @if (accountForm.name().touched() && accountForm.name().errors().length && accountForm.name().errors()[0].message) {
              <p class="mt-2 text-sm text-red-600 dark:text-red-500">{{ t(accountForm.name().errors()[0].message!) }}</p>
            }
          </div>
          <button type="submit" class="w-full text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center cursor-pointer disabled:cursor-not-allowed disabled:opacity-70 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800" [disabled]="accountForm().submitting()">
            @if (accountForm().submitting()) {
              {{ t('accounts.addAccount') }}...
            } @else {
              {{ t('accounts.addAccount') }}
            }
          </button>
          @if (errorMessage()) {
            <p class="mt-2 text-sm text-red-600 dark:text-red-500">{{ t(errorMessage()) }}</p>
          }
        </form>
      </div>
    </div>
  </div>
</section>
