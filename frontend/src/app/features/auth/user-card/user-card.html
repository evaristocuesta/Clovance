<article class="group relative w-full overflow-hidden rounded-2xl border border-gray-200 bg-white p-5 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg dark:border-gray-700 dark:bg-gray-800" *transloco="let t">
	<div class="absolute inset-y-0 left-0 w-1 bg-primary-600"></div>

	<div class="flex min-w-0 flex-col gap-5 pl-2 sm:flex-row sm:items-center sm:justify-between sm:gap-4 lg:gap-6">
		<div class="flex min-w-0 flex-1 items-center gap-3">
			<div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-primary-100 text-lg font-bold text-primary-700 ring-8 ring-primary-50 transition-colors group-hover:bg-primary-600 group-hover:text-white dark:bg-primary-900/50 dark:text-primary-300 dark:ring-gray-800">
				{{ userInitials() }}
			</div>

			<div class="min-w-0">
				<p class="text-xs font-semibold uppercase tracking-[0.2em] text-gray-500 dark:text-gray-400">
					{{ user().firstName }} {{ user().lastName }}
				</p>
				<h3 class="mt-1 break-all text-lg font-semibold text-gray-900 dark:text-white">
					{{ user().email }}
				</h3>
				<div class="mt-2 flex flex-wrap items-center gap-2">
                    @if (user().roles.includes("Admin")){
                        <span class="inline-flex items-center rounded-full bg-primary-100 px-3 py-1 text-xs font-medium text-primary-700 dark:bg-primary-700 dark:text-primary-200">
                            {{ t('users.admin') }}
                        </span>
                    } @else {
                        <span class="inline-flex items-center rounded-full bg-gray-100 px-3 py-1 text-xs font-medium text-gray-700 dark:bg-gray-700 dark:text-gray-200">
                            {{ t('users.user') }}
                        </span>
                    }
				</div>
			</div>
		</div>

        @if (!isOwner()) {
            <div class="grid w-full grid-cols-1 gap-2 sm:w-35 sm:shrink-0 ">
                <button
                    type="button"
                    (click)="onDelete()"
                    class="inline-flex w-full items-center justify-center gap-2 leading-none text-white cursor-pointer bg-red-600 hover:bg-red-700 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-red-500 dark:hover:bg-red-600 dark:focus:ring-red-900">
                    <app-icon
                        name="trash-bin"
                        class="w-6 h-6">
                    </app-icon>
                    {{ t('users.delete') }}
                </button>
            </div>
        }
	</div>
</article>
