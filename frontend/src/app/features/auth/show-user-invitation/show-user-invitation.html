<div id="inviteUserModal" 
    tabindex="-1" 
    class="relative p-4 w-full max-w-2xl z-70" *transloco="let t">
    <div class="relative p-4 w-full max-w-2xl h-full md:h-auto">
        <!-- Modal content -->
        <div class="relative p-4 bg-white rounded-lg shadow dark:bg-gray-800 sm:p-5">
            <!-- Modal header -->
            <div class="flex justify-between items-center pb-4 mb-4 rounded-t border-b sm:mb-5 dark:border-gray-600">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                    {{ t('users.invitationSent') }}
                </h3>
                <button 
                    type="button" 
                    (click)="close()"
                    class="text-gray-400 cursor-pointer bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-toggle="inviteUserModal">
                    <app-icon
                        name="close"
                        class="w-5 h-5">
                    </app-icon>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <!-- Modal body -->
            <div class="space-y-4 md:space-y-6" novalidate>
                <div class="grid gap-4 mb-4">
                    <div>
                        <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ t('users.email') }}</label>
                        <input 
                            value="{{ data.email }}" 
                            type="email" 
                            id="email" 
                            disabled 
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                    </div>
                    <div>
                        <label for="token" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ t('users.token') }}</label>
                        <input 
                            value="{{ data.token }}" 
                            id="token" 
                            disabled 
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                    </div>
                    <div>
                        <label for="expiresAt" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ t('users.expiresAt') }}</label>
                        <input 
                            value="{{ data.expiresAt | date:'dd/MM/yyyy HH:mm' }}" 
                            id="expiresAt" 
                            disabled 
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500">
                    </div>
                </div>
                <div class="flex p-4 items-end justify-end space-x-4">
                    <button 
                        class="text-white inline-flex items-center cursor-pointer bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800"
                        (click)="close()">
                        {{ t('users.close') }}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
